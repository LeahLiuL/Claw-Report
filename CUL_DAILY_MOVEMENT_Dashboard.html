<style>
:root {
    --bg:#f0f2f5; --card:#fff;--primary:#1F4E79;--accent:#2F75B5;
    --border:#e0e0e0;--text:#333;--text2:#666;--red:#c0392b;--green:#27ae60;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',-apple-system,sans-serif; background:var(--bg); padding:16px; }

.header { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff;
    padding:20px 28px; border-radius:12px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
.header h1 { font-size:22px; font-weight:700; }
.header .stats { display:flex; gap:20px; font-size:13px; opacity:.9; }
.header .stats b { font-size:20px; }

.toolbar { background:var(--card); padding:14px 20px; border-radius:10px; margin-bottom:16px;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.toolbar label { font-size:13px; color:var(--text2); font-weight:600; white-space:nowrap; }
.toolbar select, .toolbar input { padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; background:#fff; }
.toolbar select:focus, .toolbar input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(31,78,121,.15); }
.toolbar button { padding:7px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:.2s; }
.btn-primary { background:var(--primary); color:#fff; } .btn-primary:hover { background:#163d61; }
.btn-outline { background:#fff; border:1px solid var(--primary); color:var(--primary); } .btn-outline:hover { background:#f0f7ff; }

.tabs { display:flex; gap:0; margin-bottom:16px; flex-wrap:wrap; }
.tab-btn { padding:10px 22px; border:none; background:var(--card); cursor:pointer; font-size:14px; font-weight:600;
    color:var(--text2); border-bottom:3px solid transparent; transition:.2s; border-radius:8px 8px 0 0; margin-right:2px; }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); box-shadow:0 -2px 8px rgba(0,0,0,.04); }

.card { background:var(--card); border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead th { background:var(--primary); color:#fff; padding:10px 12px; text-align:left; position:sticky; top:0; z-index:2; font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
tbody tr { border-bottom:1px solid #f0f0f0; transition:background .15s; }
tbody tr:hover { background:#f8fafc; }
td { padding:8px 10px; vertical-align:middle; }

.svc-HDT{background:#E2EFDA} .svc-CCT{background:#FCE4D6} .svc-REX{background:#DDEBF7}
.svc-CGX{background:#FFF2CC} .svc-AEM{background:#E4DFEC} .svc-JPS{background:#F2F2F2}
.svc-NAF{background:#DBEEF4} .svc-MES{background:#FFE6F0} .svc-RES{background:#FFFACD}
.svc-SGX{background:#E6E6FA} .svc-SJA{background:#F0FFF0} .svc-NP2{background:#FFE4E1}
.svc-GTS{background:#E0FFFF} .svc-IMR{background:#FFEFDB}

.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; color:#333; }
.terminal-group { background:#f8fafc; border-left:4px solid var(--primary); margin-top:8px; border-radius:0 8px 8px 0; overflow:hidden;}
.terminal-group-header { background:linear-gradient(90deg,#1F4E79,#2F75B5); color:#fff; padding:10px 16px; font-weight:700; font-size:13px; display:flex; justify-content:space-between; align-items:center; }
.terminal-group-header .count { background:rgba(255,255,255,.25); padding:2px 10px; border-radius:10px; font-size:11px; }
.date-group-header { background:linear-gradient(90deg,#2F75B5,#5B9BD5); color:#fff; padding:10px 16px; font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; }

.time-cell { font-family:'Consolas','Courier New',monospace; color:var(--primary); font-weight:600; font-size:11.5px; }
.vessel-cell { font-weight:600; }
.omit { color:#999; font-style:italic; }
.delay-up { color:var(--red); font-weight:600; } .delay-ok { color:var(--green); font-weight:600; }

.search-box { flex:1; min-width:180px; max-width:300px; }
.result-count { font-size:13px; color:var(--text2); padding:8px 0; font-weight:600; }

/* ========== 下拉式多选框 ========= */
.multi-select {
    position:relative; display:inline-block;
}
.ms-trigger {
    display:flex; align-items:center; gap:6px;
    padding:7px 12px; border:1px solid var(--border); border-radius:6px;
    font-size:13px; cursor:pointer; background:#fff; min-width:130px;
    transition:border-color .2s; user-select:none;
}
.ms-trigger:hover { border-color:var(--primary); }
.ms-trigger.open { border-color:var(--primary); box-shadow:0 0 0 2px rgba(31,78,121,.15); }
.ms-trigger .ms-arrow { margin-left:auto; font-size:10px; color:#999; transition:transform .2s; }
.ms-trigger.open .ms-arrow { transform:rotate(180deg); }
.ms-trigger .ms-placeholder { color:#999; }
.ms-trigger .ms-tags { display:flex; gap:4px; flex-wrap:wrap; max-width:200px; }
.ms-tag {
    display:inline-flex; align-items:center; gap:3px;
    padding:1px 6px; background:var(--primary); color:#fff;
    border-radius:4px; font-size:11px; white-space:nowrap;
    max-width:80px; overflow:hidden; text-overflow:ellipsis;
}
.ms-tag .ms-remove { cursor:pointer; opacity:.7; line-height:1; }
.ms-tag .ms-remove:hover { opacity:1; }

/* 下拉面板 */
.ms-dropdown {
    position:absolute; top:100%; left:0; z-index:1000;
    background:#fff; border:1px solid var(--border);
    border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.15);
    min-width:220px; max-height:300px; display:none;
    flex-direction:column; overflow:hidden; margin-top:4px;
}
.ms-dropdown.show { display:flex; }

/* 面板头部 */
.ms-header {
    display:flex; align-items:center; padding:8px 14px;
    border-bottom:1px solid #f0f0f0; gap:8px;
}
.ms-header input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; }
.ms-header span { font-size:13px; font-weight:600; color:var(--text); cursor:pointer; user-select:none; }

/* 列表区域 */
.ms-list {
    overflow-y:auto; flex:1; padding:6px 0;
}
.ms-item {
    display:flex; align-items:center; gap:8px;
    padding:5px 14px; cursor:pointer; font-size:13px; transition:background .1s;
}
.ms-item:hover { background:#f5f7fa; }
.ms-item.selected { background:#eef4fc; }
.ms-item input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; pointer-events:none; }
.ms-item span { flex:1; user-select:none; }

/* 底部按钮 */
.ms-footer {
    display:flex; justify-content:space-between; padding:8px 14px;
    border-top:1px solid #f0f0f0; gap:8px;
}
.ms-footer button {
    padding:4px 16px; border-radius:4px; font-size:12px;
    cursor:pointer; border:1px solid var(--border); background:#fff;
    transition:all .15s;
}
.ms-footer .ms-clear-btn { color:#999; }
.ms-footer .ms-clear-btn:hover { color:var(--red); border-color:#ffcdd2; background:#fff5f5; }
.ms-footer .ms-ok-btn {
    background:var(--primary); color:#fff; border-color:var(--primary);
}
.ms-footer .ms-ok-btn:hover { background:#163d61; }

@media(max-width:900px){ .toolbar{flex-direction:column;align-items:stretch;} .search-box{max-width:none} }
</style>
</head>

<div class="header">
    <div>
        <h1>🚢 CUL VESSEL DAILY MOVEMENT</h1>
        <p style="opacity:.85;font-size:13px;margin-top:4px;">Daily Operations Dashboard</p>
    </div>
    <div class="stats">
        <span><b id="totalShips">-</b> Vessels</span>
        <span><b id="totalRecords">-</b> Records</span>
        <span><b id="totalTerminals">-</b> Ports</span>
    </div>
</div>

<div class="toolbar">
    <label>📅 <span title="From">From:</span></label>
    <input type="date" id="dateFrom" title="Start Date">
    <label><span title="To">To:</span></label>
    <input type="date" id="dateTo" title="End Date">

    <label>🛳️ <span title="Service Lane">Lane:</span></label>
    <div class="multi-select" id="laneMultiSelect">
        <div class="ms-trigger" id="msTrigger" onclick="toggleMsDropdown()">
            <span id="msPlaceholder" class="ms-placeholder">All Lanes</span>
            <span class="ms-tags" id="msTags"></span>
            <span class="ms-arrow">▾</span>
        </div>
        <div class="ms-dropdown" id="msDropdown">
            <div class="ms-header">
                <input type="checkbox" id="msSelectAll" onchange="msToggleAll(this.checked)">
                <span onclick="document.getElementById('msSelectAll').checked=!document.getElementById('msSelectAll').checked;msToggleAll(document.getElementById('msSelectAll').checked)">Select All</span>
            </div>
            <div class="ms-list" id="msList"></div>
            <div class="ms-footer">
                <button class="ms-clear-btn" onclick="msClear()">Clear</button>
                <button class="ms-ok-btn" onclick="msConfirm()">OK</button>
            </div>
        </div>
    </div>

    <label>🏭 <span title="Terminal/Port">Terminal:</span></label>
    <select id="selTerminal"><option value="">All</option></select>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search Vessel/VoyNo..." oninput="renderCurrent()">

    <button class="btn-primary" onclick="renderCurrent()">🔍 Filter</button>
    <button class="btn-outline" onclick="resetFilters()">↺ Reset</button>
    <button class="btn-primary" onclick="exportExcel()" style="background:#27ae60;" id="btnExport">Export Excel</button>
    <button class="btn-primary" onclick="exportPDF()" style="background:#E67E22;" id="btnPDF">Export PDF</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('terminal')" id="tabTerminal">📍 By Terminal</button>
    <button class="tab-btn" onclick="switchTab('timeline')" id="tabTimeline">📅 Timeline</button>
    <button class="tab-btn" onclick="switchTab('matrix')" id="tabMatrix">📊 Matrix</button>
    <button class="tab-btn" onclick="switchTab('raw')" id="tabRaw">📋 Raw Data</button>
</div>

<div id="resultCount" class="result-count"></div>
<div id="mainContent" class="card"></div>

// ========== 核心筛选函数 ==========
function filterRecords(){
    var df = document.getElementById('dateFrom').value;
    var dt = document.getElementById('dateTo').value;
    // Lane多选: 从msSelected获取选中项
    var selectedKeys = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    var selCount = selectedKeys.length;
    var selVals = {};
    selectedKeys.forEach(function(k){ selVals[k] = true; });
    var tVal = document.getElementById('selTerminal').value;   // Terminal
    var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();

    return DATA.all_records.filter(function(r){
        // 1) Lane/航线多选筛选
        if(selCount > 0 && !selVals[r.Service || '']) return false;

        // 2) Terminal 筛选（支持模糊匹配）
        if(tVal){
            var rTerm = (r.Terminal || '').trim();
            var rPort = (r['Port Code'] || '').trim();  // CSV中字段名为Port (Port Code)
            var matchExact = (rTerm === tVal) || (!rTerm && rPort === tVal);
            // 模糊包含
            var textKey = rTerm ? rTerm : rPort;
            var matchFuzzy = (tVal.indexOf(textKey) !== -1) || (textKey.indexOf(tVal) !== -1);
            if(!matchExact && !matchFuzzy) return false;
        }

        // 3) 搜索框
        if(q){
            var searchStr = JSON.stringify(Object.values(r)).toLowerCase();
            if(searchStr.indexOf(q) === -1) return false;
        }

        // 4) 日期范围
        if(df || dt){
            var eta = (r.ETA || '').trim();
            if(!eta || eta.toUpperCase() === 'OMIT') return false;
            // 统一格式: 兼容 2026-05-11 和 2026/05/11
            var rd = eta.split(/[-\s\/]/).slice(0, 3).join('-');
            if(df && rd < df) return false;
            if(dt && rd > dt) return false;
        }

        return true;
    });
}

function svcBadge(svc){
    if(!svc) return '<span class="badge">-</span>';
    return '<span class="badge" style="background:' + (SVC_COLORS[svc]||'#eee') + '">' + svc + '</span>';
}

function delayCell(d){
    if(!d) return '';
    var ds = String(d).toLowerCase();
    if(ds.indexOf('ahead') !== -1) return '<span class="delay-ok">' + d + '</span>';
    if(ds.indexOf('delay') !== -1) return '<span class="delay-up">' + d + '</span>';
    return d;
}

function sortByETA(arr){
    return arr.sort(function(a, b){
        var ea = (a.ETA || '').trim().toUpperCase();
        var eb = (b.ETA || '').trim().toUpperCase();
        if(ea === 'OMIT' && eb === 'OMIT') return 0;
        if(ea === 'OMIT') return 1;
        if(eb === 'OMIT') return -1;
        if(!ea && !eb) return 0;
        if(!ea) return 1;
        if(!eb) return -1;
        return ea.split('/').join('-').localeCompare(eb.split('/').join('-'));
    });
}

var MONTH_NAMES = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function fmtDate(raw){
    if(!raw) return '';
    var s = raw.trim().toUpperCase();
    if(s === 'OMIT' || s === '-') return raw;
    var parts = s.split(/[\s/\-]+/);
    if(parts.length >= 3){
        var m = parseInt(parts[1]) - 1;
        var d = parseInt(parts[2]);
        return (d < 10 ? '0' : '') + d + '-' + (MONTH_NAMES[m] || parts[1]);
    }
    return raw;
}

    if(document.getElementById('selTerminal').value) hints.push('Terminal: ' + document.getElementById('selTerminal').value);

        hints.push(document.getElementById('dateFrom').value + ' ~ ' + document.getElementById('dateTo').value);
    if(hints.length > 0) countHtml += '&nbsp;&nbsp;<small style="color:#888">[' + hints.join(' | ') + ']</small>';
    document.getElementById('resultCount').innerHTML = countHtml;

}

// ========== TAB 2: TIMELINE ==========
function renderTimeline(records){
    // 筛选有有效日期的记录
    var dated = records.filter(function(r){
        var eta = (r.ETA || '').trim();
        return eta && eta.toUpperCase() !== 'OMIT' && (eta.indexOf('-') !== -1 || eta.indexOf('/') !== -1);
    });

    // 统一解析并排序
    dated.forEach(function(r){
        var eta = r.ETA.trim().replace(/\//g, '-');
        var parts = eta.split(/[-\s:]/);
        if(parts.length >= 3){
            r._sortKey = parts[0] + '-' +
                (parts[1]||'00').padStart(2,'0') + '-' +
                (parts[2]||'00').padStart(2,'0') + ' ' +
                (parts[3]||'00') + ':' + (parts[4]||'00');
        } else {
            r._sortKey = '9999';
        }
    });
    dated.sort(function(a,b){ return (a._sortKey||'').localeCompare(b._sortKey||''); });

    // Group by date
    var days = {};
    dated.forEach(function(r){
        var d = r.ETA.trim().split(/\s+/)[0].replace(/\//g, '-');
        if(!days[d]) days[d] = [];
        days[d].push(r);
    });

    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var html = '<div style="padding:12px;">';

    if(Object.keys(days).length === 0){
        html += '<div class="filter-hint">⚠️ No arrivals in this period<br>' +
               '• Data coverage: ' + (dated[0]?dated[0]._date||'?':'?') + ' ~ ' +
               (dated[dated.length-1]?dated[dated.length-1]._date||'?':'?') + '<br>' +
               '• Try clearing date range or switch to Raw Data tab</div>';
    } else {
        Object.keys(days).sort().forEach(function(dateStr){
            var recs = days[dateStr];
            var dp = dateStr.split('-');
            var dd = new Date(parseInt(dp[0]), parseInt(dp[1])-1, parseInt(dp[2]));
            var dow = dayNames[dd.getDay()];
            var labelDate = parseInt(dp[2]) + '-' + MONTH_NAMES[parseInt(dp[1])-1] + '-' + dp[0];
            html += '<div style="margin-bottom:12px;"><div class="date-group-header">' +
                    labelDate + ' <span style="font-size:11px;opacity:.8">(' + dow + ')</span> ' +
                    '<span style="margin-left:auto;background:rgba(255,255,255,.25);padding:2px 10px;border-radius:10px;font-size:11px;">' +
                    recs.length + ' Vessels</span></div>' +
                    '<table><thead><tr>' +
                    '<th>Time</th><th>Port / Terminal</th><th>🛳️ Lane</th><th>Vessel</th>' +
                    '<th>Voy.No</th><th>ETB → ETD</th><th>Delay</th></tr></thead><tbody>';
            recs.forEach(function(r){
                var etaParts = r.ETA.trim().split(/[\s/]+/);
                var timePart = etaParts.length >= 4 ?
                    etaParts[etaParts.length-2] + ':' + etaParts[etaParts.length-1].split(':')[0] : '';
                html += '<tr class="svc-' + (r.Service||'') + '">' +
                    '<td class="time-cell">' + timePart + '</td>' +
                    '<td><b>' + escapeHtml(r['Port Code']||'-') + '</b> <small style="color:#888">(' + (r.Terminal||'-') + ')</small></td>' +
                    '<td>' + svcBadge(r.Service) + '</td>' +
                    '<td class="vessel-cell">' + escapeHtml(r['Vessel Name']||'') + '</td>' +
                    '<td>' + (r['Voy.No']||'') + '</td>' +
                    '<td class="time-cell">' + ((r.ETB||'') + ' → ' + ((r.ETD)||'')) + '</td>' +
                    '<td>' + delayCell(r.Delay) + '</td></tr>';
            });
            html += '</tbody></table></div>';
        });
    }
    html += '</div>';
    document.getElementById('mainContent').innerHTML = html;
}

// Sort mode: 0=By Service, 1=By Vessel (W/E merged), 2=By Clicked Port ETA
var matrixSortMode = 1;  // 默认按船名排序（W/E合并）
var matrixSortPort = ''; // 模式2时记录点击的port列
var userPortOrder = null; // 用户拖拽后的自定义列顺序，null=默认

// ===== Column Drag & Drop =====
var _dragStartX = 0, _draggedPort = '', _draggedEl = null;
function onDragStartCol(e, el){
    _dragStartX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    _draggedPort = el.getAttribute('data-port');
    _draggedEl = el;
    el.style.opacity = '0.4';
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _draggedPort);
}
function onDragOverCol(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    var th = e.currentTarget;
    if(th && th !== _draggedEl) th.style.boxShadow = 'inset 0 0 0 2px #1F4E79';
}
function onDragEnterCol(e){
    e.preventDefault();
}
function onDragLeaveCol(e){
    var th = e.currentTarget;
    if(th) th.style.boxShadow = '';
}
function onDropCol(e){
    e.preventDefault();
    e.stopPropagation();
    var th = e.currentTarget;
    var targetPort = th.getAttribute('data-port');
    if(th) th.style.boxShadow = '';
    if(_draggedEl) _draggedEl.style.opacity = '';
    if(_draggedPort && targetPort && _draggedPort !== targetPort){
        if(!userPortOrder){
            userPortOrder = [];
            var ths = document.querySelectorAll('.matrix-th-drop');
            for(var i=0;i<ths.length;i++) userPortOrder.push(ths[i].getAttribute('data-port'));
        }
        var fi = userPortOrder.indexOf(_draggedPort);
        var ti = userPortOrder.indexOf(targetPort);
        if(fi > -1 && ti > -1){
            userPortOrder.splice(fi, 1);
            userPortOrder.splice(ti, 0, _draggedPort);
            matrixSetSort(matrixSortMode); // re-render with new order
        }
    }
    _draggedPort = ''; _draggedEl = null;
}
function onDragEndCol(e){
    if(_draggedEl) _draggedEl.style.opacity = '';
    document.querySelectorAll('.matrix-th-drop').forEach(function(el){ el.style.boxShadow = ''; });
    _draggedPort = ''; _draggedEl = null;
}

function renderMatrix(records){
    if(records.length === 0){
        document.getElementById('mainContent').innerHTML =
            '<div class="filter-hint">⚠️ No matching records</div>';
        return;
    }

    // 0. 先定义port短码映射
    var PORT_DISPLAY_LABEL = {"CNSWA": "SHK", "CNBJI": "BJI", "CNDLC": "DLC", "CNLYG": "LYG", "CNQDG": "TAO", "CNSHA": "SHA", "CNNGB": "NGB", "CNFOC": "FOC", "CNXAM": "XMN", "CNSHK": "HKG", "CNSZP": "SZA", "CNZUH": "ZUH", "CNSKZ": "SKZ", "CNSZU": "SZU", "CNHKG": "HKG", "CNHMN": "HMN", "CNHPG": "HPG", "CNSGH": "SHA", "CNDGB": "DGB", "CNYTN": "YTN", "CNCWN": "CWN", "CNDAL": "DAL", "CNRZH": "RZH", "CNNZH": "NZH", "CNJIW": "NGB", "CNSHK/NAS": "NAS", "CNJIJ": "JJ", "CNNSA": "NAS", "Nansha, CN": "NAS", "Nansha": "NAS", "Shekou, CN": "SHK", "Shekou": "SHK", "Qingdao, CN": "TAO", "Qingdao": "TAO", "Shanghai, CN": "SHA", "Shanghai": "SHA", "Ningbo, CN": "NGB", "Ningbo": "NGB", "Xiamen, CN": "XMN", "Xiamen": "XMN", "Port Klang, MY": "PKG", "Port Klang": "PKG", "Hong Kong, CN": "HKG", "Hong Kong": "HKG", "Vung Tau, VN": "VUT", "Vung Tau": "VUT", "Humen, CN": "HMN", "Humen": "HMN", "Kaohsiung, TW": "KHH", "Kaohsiung": "KHH", "Keelung, TW": "KEL", "Keelung": "KEL", "Busan, KR": "BUSAN", "Busan": "BUSAN", "SDPZU": "BUSAN", "Singapore, SG": "SIN", "Singapore": "SIN", "Jeddah, SA": "JED", "Jeddah": "JED", "SAJED": "JED", "Yanbu, SA": "YANBU", "Yanbu": "YANBU", "Sokhna, EG": "SOK", "Sokhna": "SOK", "Djibouti, DJ": "DJJ", "Djibouti": "DJJ", "Nhava Sheva, IN": "NSA", "Nhava Sheva": "NSA", "Mundra, IN": "MUN", "Mundra": "MUN", "Laem Chabang, TH": "LCH", "Laem Chabang": "LCH", "Izmir, TR": "IZM", "Izmir": "IZM"};
    
    // 1. 收集所有Terminal（统一归一化到短码）
    var termSet = {};
    var terminals = [];
    records.forEach(function(r){
        var rawKey = (r.Terminal || r['Port Code'] || '-').trim();
        var t = PORT_DISPLAY_LABEL[rawKey] || rawKey;
        if(!termSet[t]){
            termSet[t] = true;
            terminals.push(t);
        }
    });
    // ---- Custom Port Order (short codes) ----
    var portOrderMap = {
        'TAO': 0, 'SHA': 1, 'NGB': 2, 'SHK': 3,
        'NAS': 4, 'XMN': 5,
        'PKG': 6,
        'SOK': 7, 'JED': 8,
        'KHI': 9, 'AQJ': 10,
        'MUN': 11,
    };
    function portSortKey(t){
        var idx = portOrderMap[t];
        if(idx !== undefined) return idx;
        return 999;
    }
    terminals.sort(function(a,b){
        // If user has dragged to reorder, use that
        if(userPortOrder && userPortOrder.indexOf(a) > -1 && userPortOrder.indexOf(b) > -1){
            return userPortOrder.indexOf(a) - userPortOrder.indexOf(b);
        }
        var sa = portSortKey(a), sb = portSortKey(b);
        if(sa !== sb) return sa - sb;
        return a.localeCompare(b);
    });

    // 2a. 按船+航次分组，去除W/E后缀
    function voyBase(vn){
        if(!vn) return '';
        return vn.replace(/[WE]$/, '');
    }

    var vessels = {};
    records.forEach(function(r){
        var baseVoy = voyBase(r['Voy.No'] || '');
        var key = (r.Service||'') + '|' + (r['Vessel Name']||'') + '|' + baseVoy;
        if(!vessels[key]){
            // 用第一个W或E的ETA作为排序基准
            vessels[key] = {
                service: r.Service || '',
                vessel: r['Vessel Name'] || '',
                voy: baseVoy,
                pic: r.PIC || '',
                voyOrig: r['Voy.No'] || '',    // 保留原始含W/E用于显示
                etaFirst: r.ETA || '',
                ports: {},
                rawVoySet: {}
            };
        }
        // 更新排序基准（取最早的ETA）
        if(r.ETA && r.ETA !== 'OMIT' && (!vessels[key].etaFirst || vessels[key].etaFirst === 'OMIT' ||
           r.ETA.replace(/\//g,'-').localeCompare(vessels[key].etaFirst.replace(/\//g,'-')) < 0)){
            vessels[key].etaFirst = r.ETA;
        }
        var rawT = (r.Terminal || r['Port Code'] || '-').trim();
        var t = PORT_DISPLAY_LABEL[rawT] || rawT;
        vessels[key].ports[t] = r.ETA || '';
        vessels[key].rawVoySet[r['Voy.No'] || ''] = true;
    });

    // 2b. 排序
    var svcOrder = ['HDT','CCT','REX','CGX','AEM','SGX','JPS','NAF','MES','NP2','GTS','IMR','RES','SJA'];
    var vesselKeys = Object.keys(vessels);

    function sortByService(){
        vesselKeys.sort(function(a,b){
            var va = vessels[a], vb = vessels[b];
            var sa = svcOrder.indexOf(va.service), sb = svcOrder.indexOf(vb.service);
            if(sa !== sb) return sa - sb;
            var ea = va.etaFirst || '9999';
            var eb = vb.etaFirst || '9999';
            if(ea === 'OMIT' && eb === 'OMIT') return 0;
            if(ea === 'OMIT') return 1;
            if(eb === 'OMIT') return -1;
            return ea.split('/').join('-').localeCompare(eb.split('/').join('-'));
        });
    }

    function sortByVessel(){
        vesselKeys.sort(function(a,b){
            var va = vessels[a], vb = vessels[b];
            // 船名排序
            var cmp = va.vessel.localeCompare(vb.vessel);
            if(cmp !== 0) return cmp;
            // 同船按航次号排序
            var na = parseInt(va.voy) || 0;
            var nb = parseInt(vb.voy) || 0;
            return na - nb;
        });
    }

    function sortByPortEta(portCode){
        vesselKeys.sort(function(a,b){
            var va = vessels[a], vb = vessels[b];
            var ea = (va.ports[portCode] || '').trim();
            var eb = (vb.ports[portCode] || '').trim();
            // 标准化日期格式
            function norm(d){
                if(!d || d === 'OMIT') return '9999-99-99';
                return d.split('/').join('-').split(' ')[0];
            }
            var na = norm(ea), nb = norm(eb);
            if(na === '9999-99-99' && nb === '9999-99-99') return 0;
            if(na === '9999-99-99') return 1;  // 无数据的排后面
            if(nb === '9999-99-99') return -1;
            return na.localeCompare(nb);
        });
    }

    // 根据模式选择排序
    if(matrixSortMode === 0){
        sortByService();
    } else if(matrixSortMode === 2 && matrixSortPort){
        sortByPortEta(matrixSortPort);
    } else {
        sortByVessel(); // 默认按船名排序（W/E合并）
    }

    // 3. 构建矩阵
    var colCount = 3 + terminals.length;
    var html = '<div style="overflow-x:auto;padding:12px;">';

    // 排序切换UI
    var sortHint = matrixSortMode === 2 && matrixSortPort
        ? '<span style="color:var(--primary);font-weight:700;margin-left:8px;">Sorted by <b>ETA ' + escapeHtml(matrixSortPort) + '</b></span>'
        : '';
    var dragHint = userPortOrder
        ? '<span style="color:#27ae60;font-weight:700;margin-left:8px;">Custom port order applied</span>'
        : '<span style="color:#aaa;margin-left:8px;font-size:10px;">Drag column headers to reorder</span>';
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:12px;flex-wrap:wrap;">' +
        '<span style="color:#888;">Sort:</span>' +
        '<button class="' + (matrixSortMode===0?'btn-primary':'btn-outline') +
            '" onclick="matrixSetSort(0)" id="sortSvcBtn" style="padding:4px 12px;font-size:11px;">'
            + ' By Service</button>' +
        '<button class="' + (matrixSortMode===1?'btn-primary':'btn-outline') +
            '" onclick="matrixSetSort(1)" id="sortVslBtn" style="padding:4px 12px;font-size:11px;">'
            + ' By Vessel (W/E merged)</button>' +
        sortHint + dragHint +
        '<span style="color:#999;margin-left:auto;">' +
            '<b>' + Object.keys(vessels).length + '</b> Vessels × <b>' + terminals.length + '</b> Ports</span>' +
        '</div>';

    html += '<table style="font-size:11.5px;"><thead><tr>' +
        '<th style="min-width:50px;position:sticky;left:0;z-index:3;background:#1F4E79">🛳️</th>' +
        '<th style="min-width:155px;position:sticky;left:50px;z-index:3;background:#1F4E79">Vessel</th>' +
        '<th style="min-width:50px;position:sticky;left:205px;z-index:3;background:#1F4E79">PIC</th>' +
        '<th style="min-width:65px;position:sticky;left:255px;z-index:3;background:#1F4E79">Voy</th>';

    terminals.forEach(function(t){
        var label = PORT_DISPLAY_LABEL[t] || t.replace(/, CN$/,'').replace(/, /g,' ');
        var isSortKey = (matrixSortMode === 2 && matrixSortPort === t);
        var sortIcon = isSortKey ? ' 🔽' : '';
        var thStyle = isSortKey
            ? 'min-width:90px;text-align:center;font-size:10px;white-space:normal;padding:4px;cursor:grab;background:#163d61;color:#fff;font-weight:700;user-select:none;'
            : 'min-width:90px;text-align:center;font-size:10px;white-space:normal;padding:4px;cursor:grab;transition:background .15s;user-select:none;';
        html += '<th draggable="true" class="matrix-th-drop" data-port="' + t + '" style="' + thStyle + '"' +
            ' ondragstart="onDragStartCol(event,this)"' +
            ' ondragover="onDragOverCol(event)"' +
            ' ondragenter="onDragEnterCol(event)"' +
            ' ondragleave="onDragLeaveCol(event)"' +
            ' ondrop="onDropCol(event)"' +
            ' ondragend="onDragEndCol(event)"' +
            ' onclick="matrixSetSortPort(this.getAttribute(&apos;data-port&apos;))"' +
            ' title="Drag to reorder / Click to sort by ETA ' + escapeHtml(t) + '">' +
            escapeHtml(label) + sortIcon + '</th>';
    });
    html += '</tr></thead><tbody>';

    // 模式0: 按航线分组 + Service标题行
    if(matrixSortMode === 0){
        var svcCurrent = '';
        vesselKeys.forEach(function(k){
            var v = vessels[k];
            if(v.service !== svcCurrent){
                svcCurrent = v.service;
                var bgColor = SVC_COLORS[v.service]||'#eee';
                html += '<tr style="background:' + bgColor + '">' +
                    '<td colspan="' + colCount + '" style="font-weight:700;padding:4px 10px;' +
                    'font-size:12px;color:#1F4E79;border-top:3px solid #1F4E79">' +
                    '🚢 ' + v.service + ' (' + (v.service==='HDT'?'CUL HAIPHONG / HUANGPU / XIAMEN':
                       v.service==='CCT'?'CUL YANGPU / HOOGE':
                       v.service==='REX'?'ZHONG GU YIN CHUAN / CUL NANSHA / HUMEN / YANGPU / LAEMCHABANG':
                       v.service==='CGX'?'RACINE / EXPRESS BERLIN / CUL HOCHIMINH / BZ CHONGFU':
                       v.service==='AEM'?'ZHONG GU NAN CHANG / CHENG DU / CUL SHEKOU / KLANG':
                       v.service==='SGX'?'ZHONG GU CHENG DU / HUA DONG 811 / ZHI YING HE SHUN':
                       v.service==='NP2'?'CHANG SHENG JI 7':v.service) + '</td></tr>';
            }
            html += renderMatrixRow(v, terminals);
        });
    } else {
        // 模式1: 按船名排序，每组相同船加标题分隔
        var prevVessel = '';
        vesselKeys.forEach(function(k){
            var v = vessels[k];
            if(v.vessel !== prevVessel){
                prevVessel = v.vessel;
                var bgColor = SVC_COLORS[v.service]||'#eee';
                html += '<tr style="background:' + bgColor + '">' +
                    '<td colspan="' + colCount + '" style="font-weight:700;padding:4px 10px;' +
                    'font-size:12px;color:#1F4E79;border-top:3px solid #1F4E79">' +
                    '🚢 ' + escapeHtml(v.vessel) + ' <span style="font-weight:400;font-size:10px;opacity:.7">(' + v.service + ')</span>' +
                    '</td></tr>';
            }
            html += renderMatrixRow(v, terminals);
        });
    }

    html += '</tbody></table></div>';
    document.getElementById('mainContent').innerHTML = html;
}

function matrixSetSort(mode){
    // 切换到模式0/1时清除port排序
    if(mode !== 2){ matrixSortPort = ''; }
    matrixSortMode = mode;
    renderCurrent();
}

function matrixSetSortPort(portCode){
    if(matrixSortMode === 2 && matrixSortPort === portCode){
        // 再次点击同一列 → 取消排序，恢复默认按船名
        matrixSortMode = 1;
        matrixSortPort = '';
    } else {
        matrixSortMode = 2;
        matrixSortPort = portCode;
    }
    renderCurrent();
}

function renderMatrixRow(v, terminals){
    var cls = 'svc-' + v.service;
    var r = '<tr class="' + cls + '">' +
        '<td style="position:sticky;left:0;z-index:1;text-align:center;border-bottom:1px solid #e8e8e8;">' +
        svcBadge(v.service) + '</td>' +
        '<td class="vessel-cell" style="position:sticky;left:50px;z-index:1;background:#fff;font-size:11.5px;border-bottom:1px solid #e8e8e8;">' +
        escapeHtml(v.vessel) + '</td>' +
        '<td style="position:sticky;left:205px;z-index:1;text-align:center;font-size:10px;border-bottom:1px solid #e8e8e8;">' +
        escapeHtml(v.pic) + '</td>' +
        '<td style="position:sticky;left:255px;z-index:1;text-align:center;font-size:10px;border-bottom:1px solid #e8e8e8;">' +
        v.voy + '</td>';

    terminals.forEach(function(t){
        var eta = v.ports[t] || '';
        if(!eta || eta === 'OMIT'){
            r += '<td style="text-align:center;color:#ccc;font-size:10px;border-bottom:1px solid #f5f5f5;">-</td>';
        } else {
            var dateOnly = fmtDate(eta);
            r += '<td style="text-align:center;font-size:10.5px;font-weight:600;color:#1F4E79;border-bottom:1px solid #f5f5f5;">' +
                escapeHtml(dateOnly) + '</td>';
        }
    });
    r += '</tr>';
    return r;
}

// ========== EXPORT: 按当前Tab格式导出筛选数据 ==========
var _lastFiltered = [];
var PORT_LOC_MARK = '';
var CAL_MARK = '';

function exportExcel(){
    var filtered = _lastFiltered.length > 0 ? _lastFiltered : sortByETA(filterRecords());
    if(filtered.length === 0){ alert('No data to export'); return; }

    var wb = XLSX.utils.book_new();

    if(currentTab === 'matrix'){
        exportMatrixSheet(wb, filtered);
    } else if(currentTab === 'terminal'){
        exportTerminalSheet(wb, filtered);
    } else if(currentTab === 'timeline'){
        exportTimelineSheet(wb, filtered);
    } else {
        exportRawSheet(wb, filtered);
    }

    var tabLabel = currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
    XLSX.writeFile(wb, 'CUL_Daily_Movement_' + tabLabel + '.xlsx');
}

function exportRawSheet(wb, filtered){
    var keys = ['Service','Vessel Name','PIC','Port Code','Terminal','Proforma Window',
                'Voy.No','ETA','ETB','ETD','Port Stay(h)','Delay'];
    var headers = ['Service','Vessel Name','PIC','Port Code','Terminal','Proforma',
                   'Voy.No','ETA','ETB','ETD','Port Stay(h)','Delay'];
    var data = [headers];
    filtered.forEach(function(r){
        var row = [];
        keys.forEach(function(k){
            var val = r[k] || '';
            if(k === 'ETA' || k === 'ETB' || k === 'ETD'){
                val = fmtDate(val);
            }
            row.push(val);
        });
        data.push(row);
    });
    var ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:6},{wch:22},{wch:14},{wch:10},{wch:24},{wch:18},{wch:10},{wch:16},{wch:16},{wch:16},{wch:10},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, 'Raw Data');
}

function exportTerminalSheet(wb, filtered){
    var groups = {};
    filtered.forEach(function(r){
        var t = (r.Terminal || r['Port Code'] || '-').trim();
        if(!groups[t]) groups[t] = [];
        groups[t].push(r);
    });

    var data = [['By Terminal - Filtered']];
    data.push([]);
    var sortedTerms = Object.keys(groups).sort();
    sortedTerms.forEach(function(term){
        data.push([PORT_LOC_MARK + term, '', '', 'Arrivals: ' + groups[term].length]);
        data.push(['#', 'Port', 'Lane', 'Vessel', 'Voy.No', 'ETA', 'ETB', 'ETD', 'Proforma Window']);
        groups[term].forEach(function(r, idx){
            data.push([idx+1, r['Port Code']||'', r.Service||'', r['Vessel Name']||'',
                r['Voy.No']||'', fmtDate(r.ETA), fmtDate(r.ETB), fmtDate(r.ETD), r['Proforma Window']||'']);
        });
        data.push([]);
    });

    var ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:30},{wch:8},{wch:6},{wch:22},{wch:12},{wch:16},{wch:16},{wch:16},{wch:20}];
    XLSX.utils.book_append_sheet(wb, ws, 'By Terminal');
}

function exportTimelineSheet(wb, filtered){
    var dated = filtered.filter(function(r){
        var eta = (r.ETA || '').trim();
        return eta && eta.toUpperCase() !== 'OMIT' && (eta.indexOf('-') !== -1 || eta.indexOf('/') !== -1);
    });
    var days = {};
    dated.forEach(function(r){
        var d = r.ETA.trim().split(/\s+/)[0].replace(/\//g, '-');
        if(!days[d]) days[d] = [];
        days[d].push(r);
    });

    var dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    var data = [['Timeline - Filtered']];
    data.push([]);
    Object.keys(days).sort().forEach(function(dateStr){
        var dp = dateStr.split('-');
        var dd = new Date(parseInt(dp[0]), parseInt(dp[1])-1, parseInt(dp[2]));
        var dow = dayNames[dd.getDay()];
        var labelDate = parseInt(dp[2]) + '-' + MONTH_NAMES[parseInt(dp[1])-1] + '-' + dp[0];
        data.push([CAL_MARK + labelDate + ' (' + dow + ')', '', 'Vessels: ' + days[dateStr].length]);
        data.push(['Time', 'Port / Terminal', 'Lane', 'Vessel', 'Voy.No', 'ETB', 'ETD', 'Delay']);
        days[dateStr].forEach(function(r){
            var etaParts = r.ETA.trim().split(/[\s/]+/);
            var timePart = etaParts.length >= 4 ? etaParts[etaParts.length-2] + ':' + etaParts[etaParts.length-1].split(':')[0] : '';
            data.push([timePart, (r['Port Code']||'-') + ' (' + (r.Terminal||'-') + ')', r.Service||'',
                r['Vessel Name']||'', r['Voy.No']||'', fmtDate(r.ETB), fmtDate(r.ETD), r.Delay||'']);
        });
        data.push([]);
    });

    var ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:20},{wch:30},{wch:6},{wch:22},{wch:12},{wch:16},{wch:16},{wch:10}];
    XLSX.utils.book_append_sheet(wb, ws, 'Timeline');
}

            vessels[key].etaFirst = r.ETA;
        }
        var rawT = (r.Terminal || r['Port Code'] || '-').trim();
        var t = PORT_DISPLAY_LABEL[rawT] || rawT;
        vessels[key].ports[t] = r.ETA || '';
    });

    var svcOrder = ['HDT','CCT','REX','CGX','AEM','SGX','JPS','NAF','MES','NP2','GTS','IMR','RES','SJA'];
    var vesselKeys = Object.keys(vessels);

    function sortBySvc(){
        vesselKeys.sort(function(a,b){
            var va=vessels[a],vb=vessels[b];
            var sa=svcOrder.indexOf(va.service),sb=svcOrder.indexOf(vb.service);
            if(sa!==sb) return sa-sb;
            return (va.etaFirst||'9999').localeCompare(vb.etaFirst||'9999');
        });
    }
    function sortByVsl(){
        vesselKeys.sort(function(a,b){
            var va=vessels[a],vb=vessels[b];
            var cmp=va.vessel.localeCompare(vb.vessel);
            return cmp !== 0 ? cmp : (parseInt(va.voy)||0)-(parseInt(vb.voy)||0);
        });
    }
    function sortByPortE(portCode){
        vesselKeys.sort(function(a,b){
            function norm(d){ if(!d||d==='OMIT') return '9999-99-99'; return d.split('/').join('-').split(' ')[0]; }
            var na=norm(vessels[a].ports[portCode]||''),nb=norm(vessels[b].ports[portCode]||'');
            if(na==='9999-99-99'&&nb==='9999-99-99') return 0;
            if(na==='9999-99-99') return 1;
            if(nb==='9999-99-99') return -1;
            return na.localeCompare(nb);
        });
    }
    if(matrixSortMode===0) sortBySvc();
    else if(matrixSortMode===2&&matrixSortPort) sortByPortE(matrixSortPort);
    else sortByVsl();

    var data = [['Matrix - Filtered']];
    data.push([]);
    var header = ['Lane', 'Vessel', 'PIC', 'Voy'];
    terminals.forEach(function(t){ header.push(t); });
    data.push(header);

    if(matrixSortMode === 0){
        var svcCurrent = '';
        vesselKeys.forEach(function(k){
            var v = vessels[k];
            if(v.service !== svcCurrent){
                svcCurrent = v.service;
                var row = [v.service, '', ''];
                terminals.forEach(function(){ row.push(''); });
                data.push(row);
            }
            var row = [v.service, v.vessel, v.pic, v.voy];
            terminals.forEach(function(t){
                var eta = v.ports[t] || '';
                row.push((eta && eta !== 'OMIT') ? fmtDate(eta) : '-');
            });
            data.push(row);
        });
    } else {
        var prevVessel = '';
        vesselKeys.forEach(function(k){
            var v = vessels[k];
            if(v.vessel !== prevVessel){
                prevVessel = v.vessel;
                var row = [v.vessel + ' (' + v.service + ')', '', '', ''];
                terminals.forEach(function(){ row.push(''); });
                data.push(row);
            }
            var row = [v.service, v.vessel, v.pic, v.voy];
            terminals.forEach(function(t){
                var eta = v.ports[t] || '';
                row.push((eta && eta !== 'OMIT') ? fmtDate(eta) : '-');
            });
            data.push(row);
        });
    }

    var ws = XLSX.utils.aoa_to_sheet(data);
    var cols = [{wch:6},{wch:22},{wch:10},{wch:8}];
    terminals.forEach(function(){ cols.push({wch:14}); });
    ws['!cols'] = cols;
    XLSX.utils.book_append_sheet(wb, ws, 'Matrix');
}

function escapeHtml(text){
    if(!text) return '';
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportPDF(){
    var content = document.getElementById('mainContent');
    if(!content || !content.innerHTML.trim()){
        alert('No data to export'); return;
    }

    var tabNames = {terminal:'Terminal',timeline:'Timeline',matrix:'Matrix',raw:'Raw_Data'};
    var tabLabel = tabNames[currentTab] || 'Dashboard';
    var today = new Date();
    var dateStr = today.getFullYear() + String(today.getMonth()+1).padStart(2,'0') + String(today.getDate()).padStart(2,'0');

    // Build a print-friendly wrapper
    var wrapper = document.createElement('div');
    wrapper.style.cssText = 'padding:15px;font-family:Segoe UI,Arial,sans-serif;color:#333;';
    // Title
    wrapper.innerHTML = '<div style="text-align:center;margin-bottom:12px;">' +
        '<h2 style="margin:0 0 4px;color:#1F4E79;font-size:16px;">CUL Daily Movement - ' + tabLabel + '</h2>' +
        '<p style="margin:0;color:#888;font-size:11px;">Generated: ' + dateStr + '</p></div>';

    // Get filter hint
    var hintEl = document.querySelector('.filter-hint');
    if(hintEl && hintEl.textContent.trim()){
        wrapper.innerHTML += '<div style="font-size:10px;color:#666;margin-bottom:8px;padding:4px 8px;background:#f5f5f5;border-radius:3px;">' +
            hintEl.textContent.trim() + '</div>';
    }

    // Clone table content
    var tables = content.querySelectorAll('table');
    if(tables.length === 0){
        wrapper.innerHTML += '<p>No table data found.</p>';
    } else {
        tables.forEach(function(table){
            var clone = table.cloneNode(true);
            // Remove sticky positioning for PDF
            clone.querySelectorAll('[style*="position:sticky"]').forEach(function(el){
                el.style.position = 'static';
            });
            clone.style.cssText = 'width:100%;border-collapse:collapse;margin-bottom:16px;font-size:10px;';
            clone.querySelectorAll('th').forEach(function(th){
                th.style.cssText = 'background:#1F4E79;color:#fff;padding:5px 8px;text-align:center;font-size:10px;border:1px solid #ccc;';
            });
            clone.querySelectorAll('td').forEach(function(td){
                td.style.cssText += ';padding:4px 6px;border:1px solid #ddd;';
            });
            wrapper.appendChild(clone);
        });
    }

    // Keep svc-row colors
    var styleBlock = document.createElement('style');
    styleBlock.textContent = '';
    Object.keys(SVC_COLORS).forEach(function(code){
        styleBlock.textContent += '.svc-' + code + ' td { background: ' + SVC_COLORS[code] + ' !important; }';
    });
    wrapper.prepend(styleBlock);

    var opt = {
        margin: [8, 8, 8, 8],
        filename: 'CUL_Daily_Movement_' + tabLabel + '_' + dateStr + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    };

    html2pdf().set(opt).from(wrapper).save();
}

// Initial render
renderCurrent();
</script>
