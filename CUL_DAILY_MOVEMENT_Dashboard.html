<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUL Daily Movement Dashboard</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
    --bg:#f0f2f5; --card:#fff;--primary:#1F4E79;--accent:#2F75B5;
    --border:#e0e0e0;--text:#333;--text2:#666;--red:#c0392b;--green:#27ae60;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',-apple-system,sans-serif; background:var(--bg); padding:16px; }

.header { background:linear-gradient(135deg,var(--primary),var(--accent)); color:#fff;
    padding:20px 28px; border-radius:12px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
.header h1 { font-size:22px; font-weight:700; }
.header .stats { display:flex; gap:20px; font-size:13px; opacity:.9; }
.header .stats b { font-size:20px; }

.toolbar { background:var(--card); padding:14px 20px; border-radius:10px; margin-bottom:16px;
    display:flex; gap:10px; flex-wrap:wrap; align-items:center; box-shadow:0 1px 4px rgba(0,0,0,.08); }
.toolbar label { font-size:13px; color:var(--text2); font-weight:600; white-space:nowrap; }
.toolbar select, .toolbar input { padding:7px 10px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; background:#fff; }
.toolbar select:focus, .toolbar input:focus { border-color:var(--primary); box-shadow:0 0 0 2px rgba(31,78,121,.15); }
.toolbar button { padding:7px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; transition:.2s; }
.btn-primary { background:var(--primary); color:#fff; } .btn-primary:hover { background:#163d61; }
.btn-outline { background:#fff; border:1px solid var(--primary); color:var(--primary); } .btn-outline:hover { background:#f0f7ff; }

.tabs { display:flex; gap:0; margin-bottom:16px; flex-wrap:wrap; }
.tab-btn { padding:10px 22px; border:none; background:var(--card); cursor:pointer; font-size:14px; font-weight:600;
    color:var(--text2); border-bottom:3px solid transparent; transition:.2s; border-radius:8px 8px 0 0; margin-right:2px; }
.tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); box-shadow:0 -2px 8px rgba(0,0,0,.04); }

.card { background:var(--card); border-radius:10px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
table { width:100%; border-collapse:collapse; font-size:12.5px; }
thead th { background:var(--primary); color:#fff; padding:10px 12px; text-align:left; position:sticky; top:0; z-index:2; font-size:11px; text-transform:uppercase; letter-spacing:.3px; }
tbody tr { border-bottom:1px solid #f0f0f0; transition:background .15s; }
tbody tr:hover { background:#f8fafc; }
td { padding:8px 10px; vertical-align:middle; }

/* svc row colors are dynamically generated from SVC_COLORS_CSS */

.badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:700; color:#333; }

.time-cell { font-family:'Consolas','Courier New',monospace; color:var(--primary); font-weight:600; font-size:11.5px; }
.vessel-cell { font-weight:600; }

.search-box { flex:1; min-width:180px; max-width:300px; }
.result-count { font-size:13px; color:var(--text2); padding:8px 0; font-weight:600; }

/* ========== 下拉式多选框 ========= */
.multi-select {
    position:relative; display:inline-block;
}
.ms-trigger {
    display:flex; align-items:center; gap:6px;
    padding:7px 12px; border:1px solid var(--border); border-radius:6px;
    font-size:13px; cursor:pointer; background:#fff; min-width:130px;
    transition:border-color .2s; user-select:none;
}
.ms-trigger:hover { border-color:var(--primary); }
.ms-trigger.open { border-color:var(--primary); box-shadow:0 0 0 2px rgba(31,78,121,.15); }
.ms-trigger .ms-arrow { margin-left:auto; font-size:10px; color:#999; transition:transform .2s; }
.ms-trigger.open .ms-arrow { transform:rotate(180deg); }
.ms-trigger .ms-placeholder { color:#999; }
.ms-trigger .ms-tags { display:flex; gap:4px; flex-wrap:wrap; max-width:200px; }
.ms-tag {
    display:inline-flex; align-items:center; gap:3px;
    padding:1px 6px; background:var(--primary); color:#fff;
    border-radius:4px; font-size:11px; white-space:nowrap;
    max-width:80px; overflow:hidden; text-overflow:ellipsis;
    pointer-events:auto;
}
.ms-tag .ms-remove { cursor:pointer; opacity:.7; line-height:1; }
.ms-tag .ms-remove:hover { opacity:1; }

/* 下拉面板 */
.ms-dropdown {
    position:absolute; top:100%; left:0; z-index:1000;
    background:#fff; border:1px solid var(--border);
    border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.15);
    min-width:220px; max-height:450px; display:none;
    flex-direction:column; overflow:hidden; margin-top:4px;
}
.ms-dropdown.show { display:flex; }

/* 面板头部 */
.ms-header {
    display:flex; align-items:center; padding:8px 14px;
    border-bottom:1px solid #f0f0f0; gap:8px;
}
.ms-header input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; }
.ms-header span { font-size:13px; font-weight:600; color:var(--text); cursor:pointer; user-select:none; }

/* 列表区域 */
.ms-list {
    overflow-y:auto; flex:1; padding:6px 0;
}
.ms-item {
    display:flex; align-items:center; gap:8px;
    padding:5px 14px; cursor:pointer; font-size:13px; transition:background .1s;
}
.ms-item:hover { background:#f5f7fa; }
.ms-item.selected { background:#eef4fc; }
.ms-item input[type="checkbox"] { width:16px; height:16px; accent-color:var(--primary); cursor:pointer; pointer-events:none; }
.ms-item span { flex:1; user-select:none; }

/* 底部按钮 */
.ms-footer {
    display:flex; justify-content:space-between; padding:8px 14px;
    border-top:1px solid #f0f0f0; gap:8px;
}
.ms-footer button {
    padding:4px 16px; border-radius:4px; font-size:12px;
    cursor:pointer; border:1px solid var(--border); background:#fff;
    transition:all .15s;
}
.ms-footer .ms-clear-btn { color:#999; }
.ms-footer .ms-clear-btn:hover { color:var(--red); border-color:#ffcdd2; background:#fff5f5; }
.ms-footer .ms-ok-btn {
    background:var(--primary); color:#fff; border-color:var(--primary);
}
.ms-footer .ms-ok-btn:hover { background:#163d61; }

@media(max-width:900px){ .toolbar{flex-direction:column;align-items:stretch;} .search-box{max-width:none} }
</style>
</head>
<body>

<div class="header">
    <div>
        <h1>Long Term Schedule Dashboard</h1>
        <p style="opacity:.85;font-size:13px;margin-top:4px;">Long Term Schedule Matrix</p>
    </div>
    <div class="stats">
        <span><b id="totalShips">-</b> Vessels</span>
        <span><b id="totalRecords">-</b> Records</span>
        <span><b id="totalTerminals">-</b> Ports</span>
    </div>
</div>

<div class="toolbar">
    <label>📅 <span title="From">From:</span></label>
    <input type="date" id="dateFrom" title="Start Date">
    <label><span title="To">To:</span></label>
    <input type="date" id="dateTo" title="End Date">

    <label>🛳️ <span title="Service Lane">Lane:</span></label>
    <div class="multi-select" id="laneMultiSelect">
        <div class="ms-trigger" id="msTrigger" onclick="toggleMsDropdown()">
            <span id="msPlaceholder" class="ms-placeholder">All Lanes</span>
            <span class="ms-tags" id="msTags"></span>
            <span class="ms-arrow">▾</span>
        </div>
        <div class="ms-dropdown" id="msDropdown">
            <div class="ms-header">
                <input type="checkbox" id="msSelectAll" onchange="msToggleAll(this.checked)">
                <span onclick="document.getElementById('msSelectAll').checked=!document.getElementById('msSelectAll').checked;msToggleAll(document.getElementById('msSelectAll').checked)">Select All</span>
            </div>
            <div class="ms-list" id="msList"></div>
            <div class="ms-footer">
                <button class="ms-clear-btn" onclick="msClear()">Clear</button>
                <button class="ms-ok-btn" onclick="msConfirm()">OK</button>
            </div>
        </div>
    </div>

    <label>🏭 <span title="Terminal/Port">Terminal:</span></label>
    <select id="selTerminal"><option value="">All</option></select>

    <label>🚢 <span title="Operator">OP:</span></label>
    <div class="multi-select" id="opMultiSelect">
        <div class="ms-trigger" id="opMsTrigger" onclick="toggleOpMsDropdown()">
            <span id="opMsPlaceholder" class="ms-placeholder">All OPs</span>
            <span class="ms-tags" id="opMsTags"></span>
            <span class="ms-arrow">▾</span>
        </div>
        <div class="ms-dropdown" id="opMsDropdown">
            <div class="ms-header">
                <input type="checkbox" id="opMsSelectAll" onchange="opMsToggleAll(this.checked)">
                <span onclick="document.getElementById('opMsSelectAll').checked=!document.getElementById('opMsSelectAll').checked;opMsToggleAll(document.getElementById('opMsSelectAll').checked)">Select All</span>
            </div>
            <div class="ms-list" id="opMsList"></div>
            <div class="ms-footer">
                <button class="ms-clear-btn" onclick="opMsClear()">Clear</button>
                <button class="ms-ok-btn" onclick="opMsConfirm()">OK</button>
            </div>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search Vessel/VoyNo..." oninput="renderCurrent()">

    <button class="btn-primary" onclick="renderCurrent()">🔍 Filter</button>
    <button class="btn-outline" onclick="resetFilters()">↺ Reset</button>
    <button class="btn-outline" onclick="exportExcel()" title="Export to Excel">📊 Excel</button>
    <button class="btn-outline" onclick="exportPDF()" title="Export to PDF">📄 PDF</button>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('longterm')" id="tabLongterm">🗓️ Long Term</button>
    <button class="tab-btn" onclick="switchTab('raw')" id="tabRaw">📋 Raw Data</button>
</div>

<div id="resultCount" class="result-count"></div>
<div id="mainContent" class="card"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<script src="long_term_schedule_data.js?v=20260519c"></script>
<script>
// ========== Export Functions ==========

function getCurrentRawData() {
    var tVal = document.getElementById('selTerminal').value;
    var opSelectedKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opHasSelection = opSelectedKeys.length > 0 && opSelectedKeys.length < (window.DATA && window.DATA.all_operators || []).length;
    var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
    return (window.DATA && window.DATA.all_records || []).filter(function(r) {
        if (tVal && (r['Port Code'] || '') !== tVal && (r['Terminal'] || '') !== tVal) return false;
        var selCount = 0, selVals = {};
        Object.keys(msSelected).forEach(function(k){ if(msSelected[k]){ selVals[k]=true; selCount++; } });
        if (selCount > 0 && !selVals[r.Service || '']) return false;
        if (opHasSelection && opSelectedKeys.indexOf((r.Operator || '').trim()) === -1) return false;
        if (q) { var hay = (r.Service + ' ' + r['Vessel Name'] + ' ' + r['Port Code'] + ' ' + r['Voy.No']).toLowerCase(); if (hay.indexOf(q) === -1) return false; }
        return true;
    });
}

function getCurrentMatrixData() {
    // Rebuild from renderLongTermMatrix logic (filtered voyages × ports)
    var svcOrder = ['HDT','CCT','REX','CGX','AEM','SGX','JPS','NAF','MES','NP','GTS','IMR','RES','SJA',
        'AM','BDX','CGS','CH','CI','CP','CST','CSX','CWS','HLX','IQH','JCT','KHX','MFX','NSX','RTS','SGS','SL','ST','SVP','TBS','TH'];
    var allVoyages = [];
    var selectedSvcs = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    var allLanes = _getLaneOptions().map(function(l){ return l.code; });
    var msHasSelection = selectedSvcs.length > 0 && selectedSvcs.length < allLanes.length;
    var opSelectedKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opHasSelection = opSelectedKeys.length > 0 && opSelectedKeys.length < (window.DATA && window.DATA.all_operators || []).length;
    LT_DATA.forEach(function(svc) {
        var svcShort = (svc.short || '').trim();
        if (!svcShort) svcShort = (svc.code || '').substring(0, 3);
        if (msHasSelection && selectedSvcs.indexOf(svcShort) === -1) return;
        (svc.voyages || []).forEach(function(v) {
            if (opHasSelection && opSelectedKeys.indexOf((v.operator || '').trim()) === -1) return;
            allVoyages.push({ service: svcShort, code: svc.code, vessel: v.vessel, vessel_voy: v.vessel_voy, operator: v.operator || '', week: v.week || '', etas: v.etas || {} });
        });
    });
    // Sort
    if (ltSortPort) {
        allVoyages.sort(function(a, b) {
            var da = ltParseETA(a.etas[ltSortPort] || ''), db = ltParseETA(b.etas[ltSortPort] || '');
            if (da === null && db === null) return 0; if (da === null) return 1; if (db === null) return -1;
            return ltSortAsc ? (da - db) : (db - da);
        });
    } else {
        allVoyages.sort(function(a, b) {
            var sa = svcOrder.indexOf(a.service), sb = svcOrder.indexOf(b.service);
            if (sa !== sb) return (sa === -1 ? 999 : sa) - (sb === -1 ? 999 : sb);
            return (a.week || '').localeCompare(b.week || '');
        });
    }
    // Ports with data
    var portHasData = {};
    allVoyages.forEach(function(v) { Object.keys(v.etas).forEach(function(p) { if (v.etas[p] && v.etas[p] !== '-') portHasData[p] = true; }); });
    var ports = (ltPortOrder || []).filter(function(p) { return portHasData[p]; });
    if (ports.length === 0) ports = Object.keys(portHasData);
    // Build rows
    var rows = [];
    allVoyages.forEach(function(v) {
        var row = { 'Service': v.service, 'Vessel': v.vessel, 'Voy': v.vessel_voy || '', 'Week': v.week || '', 'OP': v.operator || '' };
        ports.forEach(function(p) { row['ETA_' + p] = v.etas[p] || ''; });
        rows.push(row);
    });
    return rows;
}

function exportPDF() {
    var el = document.getElementById('mainContent');
    if (!el) return;
    var opt = { margin: 0.3, filename: 'CUL_DAILY_' + currentTab + '_' + new Date().toISOString().slice(0,10) + '.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' } };
    html2pdf().set(opt).from(el).save();
}

// ========== Global state (must be before IIFE) ==========
var msSelected = {};  // {svc: true/false}
var opMsSelected = {};  // {op: true/false}
var msDropdownOpen = false;
var currentTab = 'longterm';

// ========== LT_SVC_COLORS must be defined before IIFE ==========
var LT_SVC_COLORS = {
    'AM':'#e8f4fd','BDX':'#fff3e0','CCT':'#e8f5e9','CGS':'#fce4ec','CGX':'#f3e5f5',
    'CH':'#e0f7fa','CI':'#fff8e1','CP':'#f1f8e9','CST':'#ede7f6','CSX':'#e8eaf6',
    'CWS':'#e0f2f1','GTS':'#fbe9e7','HDT':'#fff9c4','HLX':'#f3e5f5','IMR':'#e8eaf6',
    'IQH':'#fce4ec','JCT':'#e0f7fa','JPS':'#e8f4fd','KHX':'#fff3e0','MES':'#fbe9e7',
    'MFX':'#e8f5e9','NAF':'#f1f8e9','NP':'#ede7f6','NSX':'#e0f2f1','RES':'#fce4ec',
    'REX':'#fff8e1','RTS':'#e8eaf6','SGS':'#f3e5f5','SGX':'#e0f7fa','SJA':'#fff3e0',
    'SL':'#e8f5e9','ST':'#f3e5f5','SVP':'#fce4ec','TBS':'#e8eaf6','TH':'#fff8e1'
};

// ========== Load LT_DATA then build window.DATA ==========
// LT_DATA is defined in long_term_schedule_data.js

// ========== Build DATA from LT_DATA ==========
// Execute immediately after long_term_schedule_data.js loads
(function() {
    // Flatten LT_DATA into all_records
    var records = [];
    var svcSet = {};
    var portSet = {};
    var termSet = {};
    var opSet = {};

    LT_DATA.forEach(function(svc) {
        var svcShort = svc.short;
        var terminals = svc.port_terminals || {};
        var portKeys = Object.keys(terminals);

        svc.voyages.forEach(function(voy) {
            if (!voy.vessel) return;
            var etas = voy.etas || {};
            portKeys.forEach(function(port) {
                var eta = etas[port] || '';
                if (!eta) return;
                var svcId = (svc.code || svcShort).substring(0, 3);
                records.push({
                    "Service": svcId,
                    "Vessel Name": voy.vessel,
                    "Voy.No": voy.vessel_voy || '',
                    "Port Code": port,
                    "Terminal": terminals[port] || port,
                    "ETA": eta,
                    "Week": voy.week || '',
                    "Operator": voy.operator || ''
                });
                svcSet[svcId] = true;
                portSet[port] = true;
                termSet[terminals[port] || port] = true;
                if (voy.operator) opSet[voy.operator.trim()] = true;
            });
        });
    });

    window.DATA = {
        all_records: records,
        services: Object.keys(svcSet).sort(),
        all_terminals: Object.keys(termSet).sort(),
        all_operators: Object.keys(opSet).sort(),
        dated_records: []
    };

    // Build month name mapping for ETA parsing
    var MONTHS = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',
                  Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
    window.LT_MONTHS = MONTHS;

    // SVC_COLORS (attached to window so svcBadge can access it)
    window.SVC_COLORS = {"HDT":"#F4A261","CCT":"#2A9D8F","REX":"#457B9D","CGX":"#E9C46A","AEM":"#9B5DE5","JPS":"#00B4D8","NAF":"#E76F51","MES":"#D63384","RES":"#06D6A0","SGX":"#7209B7","SJA":"#4CC9F0","NP2":"#F72585","GTS":"#FFD166","IMR":"#06A77D"};

    // Init stats
    var shipSet = new Set(window.DATA.all_records.map(function(r){return r['Vessel Name'];}));
    document.getElementById('totalShips').textContent = shipSet.size;
    document.getElementById('totalRecords').textContent = window.DATA.all_records.length;
    document.getElementById('totalTerminals').textContent = window.DATA.all_terminals.length;

    // Populate Terminal select
    window.DATA.all_terminals.forEach(function(t){
        var o = document.createElement('option');
        o.value=t; o.textContent=t;
        document.getElementById('selTerminal').appendChild(o);
    });

    // Populate OP multi-select — use LT operators (more complete than CSV raw data)
    var opListEl = document.getElementById('opMsList');
    opListEl.innerHTML = '';
    var ltOps = ltAllOperators();
    // Override all_operators with LT data
    window.DATA.all_operators = ltOps;
    ltOps.forEach(function(op){
        opMsSelected[op] = true;
        var div = document.createElement('div');
        div.className = 'ms-item selected';
        div.innerHTML = '<input type="checkbox" checked><span>' + escapeHtml(op) + '</span>';
        div.dataset.opCode = op;  // store for tag removal matching
        div.onclick = function(e){
            e.stopPropagation();
            var cb = this.querySelector('input[type=checkbox]');
            cb.checked = !cb.checked;
            opMsSelected[op] = cb.checked;
            this.classList.toggle('selected', cb.checked);
            updateOpSelectAllState();
        };
        opListEl.appendChild(div);
    });
    updateOpTriggerUI();

    // 初始化多选
    initMultiSelect();

    // Default date range (auto-fill from data)
    if(window.DATA.dated_records && window.DATA.dated_records.length > 0){
        document.getElementById('dateFrom').value = window.DATA.dated_records[0]._date;
        const lastRec = window.DATA.dated_records[window.DATA.dated_records.length - 1];
        if(lastRec && lastRec._date) document.getElementById('dateTo').value = lastRec._date;
    }

    // Initial render
    renderCurrent();
})();
function parseLTETA(eta) {
    if (!eta) return '9999';
    var clean = eta.replace(/\s*(P\/O|P\/I|OMIT).*$/, '').trim();
    if (!clean) return '9999';
    var parts = clean.split('-');
    if (parts.length !== 2) return '9999';
    var day = parts[0].trim();
    var mon = parts[1].trim();
    var monNum = LT_MONTHS[mon];
    if (!monNum || !day) return '9999';
    return '2026-' + monNum + '-' + day.padStart(2, '0');
}

function parseLTETADateObj(eta) {
    if (!eta) return null;
    var clean = eta.replace(/\s*(P\/O|P\/I|OMIT).*$/, '').trim();
    if (!clean) return null;
    var parts = clean.split('-');
    if (parts.length !== 2) return null;
    var day = parseInt(parts[0].trim());
    var mon = LT_MONTHS[parts[1].trim()];
    if (!mon || isNaN(day)) return null;
    return new Date(2026, parseInt(mon) - 1, day);
}

function formatLTDate(eta) {
    // "14-Apr" -> "14-Apr", keep as-is for display
    return eta || '';
}

// SVC_COLORS is now initialized inside the IIFE above (window.SVC_COLORS)

// ========== Lane 多选下拉框 ==========
// Build unique lane short-codes from LT_DATA (deduplicated, user-friendly)
function _getLaneOptions(){
    var laneMap = {};  // short -> count
    (window.LT_DATA || []).forEach(function(svc){
        var s = (svc.short || '').trim().substring(0, 5);
        if (!s) return;
        laneMap[s] = (laneMap[s] || 0) + 1;
    });
    // Sort by code alphabetically
    var keys = Object.keys(laneMap).sort();
    return keys.map(function(k){ return {code: k, count: laneMap[k]}; });
}

function initMultiSelect(){
    var listEl = document.getElementById('msList');
    listEl.innerHTML = '';
    var lanes = _getLaneOptions();
    // Reset msSelected with lane short-codes
    msSelected = {};
    lanes.forEach(function(lane){
        var label = lane.count > 1 ? lane.code + ' (' + lane.count + ')' : lane.code;
        msSelected[lane.code] = true;
        var div = document.createElement('div');
        div.className = 'ms-item selected';
        div.innerHTML = '<input type="checkbox" checked><span>' + label + '</span>';
        div.dataset.laneCode = lane.code;
        div.onclick = function(e){
            e.stopPropagation();
            var cb = this.querySelector('input[type=checkbox]');
            cb.checked = !cb.checked;
            msSelected[this.dataset.laneCode] = cb.checked;
            this.classList.toggle('selected', cb.checked);
            updateSelectAllState();
        };
        listEl.appendChild(div);
    });
    updateTriggerUI();
}

function toggleMsDropdown(){

// sortByETA: work with "14-Apr" format
function sortByETA(records) {
    return records.slice().sort(function(a, b) {
        return parseLTETA(a.ETA).localeCompare(parseLTETA(b.ETA));
    });
}

// filterRecords for LT data
function filterRecords() {
    var df = document.getElementById('dateFrom').value;
    var dt = document.getElementById('dateTo').value;
    var selectedKeys = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    var selCount = selectedKeys.length;
    var selVals = {};
    selectedKeys.forEach(function(k){ selVals[k] = true; });
    var tVal = document.getElementById('selTerminal').value;
    var opSelectedKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opHasSelection = opSelectedKeys.length > 0 && opSelectedKeys.length < DATA.all_operators.length;
    var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();

    return DATA.all_records.filter(function(r) {
        if (selCount > 0 && !selVals[r.Service || '']) return false;

        if (opHasSelection && opSelectedKeys.indexOf((r.Operator || '').trim()) === -1) return false;

        if (tVal) {
            var term = (r.Terminal || r['Port Code'] || '').toLowerCase();
            var port = (r['Port Code'] || '').toLowerCase();
            if (term.indexOf(tVal.toLowerCase()) === -1 && port.indexOf(tVal.toLowerCase()) === -1) return false;
        }

        if (q) {
            var hay = (r.Service + ' ' + r['Vessel Name'] + ' ' + r['Port Code'] + ' ' + r['Voy.No'] + ' ' + r.Week).toLowerCase();
            if (hay.indexOf(q) === -1) return false;
        }

        // Date filter: convert "14-Apr" to date for comparison
        if (df || dt) {
            var d = parseLTETADateObj(r.ETA);
            if (!d) return false;
            if (df) { var from = new Date(df); if (d < from) return false; }
            if (dt) { var to = new Date(dt); if (d > to) return false; }
        }

        return true;
    });
}

function renderCurrent() {
    var filtered = sortByETA(filterRecords());
    _lastFiltered = filtered;
    var countHtml = 'Filtered: <b style="color:var(--primary)">' + filtered.length + '</b> / ' + DATA.all_records.length + ' Records';
    var hints = [];
    var selectedSvcs = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    if (selectedSvcs.length > 0 && selectedSvcs.length < _getLaneOptions().length) hints.push('Lane: ' + selectedSvcs.join('/'));
    if (document.getElementById('selTerminal').value) hints.push('Port: ' + document.getElementById('selTerminal').value);
    if (document.getElementById('dateFrom').value || document.getElementById('dateTo').value)
        hints.push(document.getElementById('dateFrom').value + ' ~ ' + document.getElementById('dateTo').value);
    if (hints.length > 0) countHtml += '&nbsp;&nbsp;<small style="color:#888">[' + hints.join(' | ') + ']</small>';
    document.getElementById('resultCount').innerHTML = countHtml;

    if (currentTab === 'longterm') renderLongTermMatrix();
    else renderRaw(filtered);
}

// HTML escape utility
function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// renderRaw for LT data
function renderRaw(records) {
    var html = '<div style="overflow-x:auto;"><table><thead><tr>' +
        '<th>#</th><th>Service</th><th>Vessel</th><th>Voy</th><th>Port</th><th>Terminal</th>' +
        '<th>Week</th><th>ETA</th><th>Operator</th></tr></thead><tbody>';
    records.forEach(function(r, i) {
        html += '<tr class="svc-' + (r.Service || '') + '">' +
            '<td style="color:#888;text-align:center;width:35px">' + (i + 1) + '</td>' +
            '<td>' + svcBadge(r.Service) + '</td>' +
            '<td class="vessel-cell">' + escapeHtml(r['Vessel Name'] || '') + '</td>' +
            '<td>' + (r['Voy.No'] || '') + '</td>' +
            '<td>' + (r['Port Code'] || '') + '</td>' +
            '<td style="font-size:11px;color:#666">' + (r.Terminal || '-') + '</td>' +
            '<td>' + (r.Week || '') + '</td>' +
            '<td class="time-cell">' + escapeHtml(r.ETA || '') + '</td>' +
            '<td>' + (r.Operator || '') + '</td></tr>';
    });
    html += '</tbody></table></div>';
    document.getElementById('mainContent').innerHTML = html;
}

var ltFilterSvc = '';
var ltFilterVessel = '';
var ltFilterOp = '';
var ltSortPort = ''; // port code to sort by, '' = default order
var ltSortAsc = true;
var ltPortOrder = null; // user drag reorder

function ltPortLabel(code) {
    if (!code) return '-';
    return code;
}

function ltAllPorts() {
    // Merge port order from service rotation (svc.ports), fallback to port_terminals keys
    var seen = {};
    var merged = [];
    LT_DATA.forEach(function(svc) {
        var ports = svc.ports || Object.keys(svc.port_terminals || {});
        ports.forEach(function(p) {
            if (!seen[p]) { seen[p] = true; merged.push(p); }
        });
    });
    return merged;
}

function ltAllServices() {
    var set = {};
    LT_DATA.forEach(function(svc) {
        var s = (svc.short || '').trim();
        if (!s) s = (svc.code || '').substring(0, 5);
        if (s) set[s] = true;
    });
    return Object.keys(set).sort();
}

function ltAllOperators() {
    var set = {};
    LT_DATA.forEach(function(svc) {
        (svc.voyages || []).forEach(function(v) {
            var op = (v.operator || '').trim();
            if (op) set[op] = true;
        });
    });
    return Object.keys(set).sort();
}

function ltAllVessels() {
    var set = {};
    LT_DATA.forEach(function(svc) {
        (svc.voyages || []).forEach(function(v) { set[v.vessel] = true; });
    });
    return Object.keys(set).sort();
}

function ltSortByPort(port) {
    if (ltSortPort === port) {
        ltSortAsc = !ltSortAsc; // toggle direction
    } else {
        ltSortPort = port;
        ltSortAsc = true;
    }
    renderLongTermMatrix();
}

function ltParseETA(raw) {
    // Parse "DD-Mon" format like "15-Jun", "03-Jul"
    if (!raw || raw === '-' || raw.trim() === '') return null;
    raw = raw.trim();
    var m = raw.match(/^(\d{1,2})-([A-Za-z]{3})$/);
    if (!m) return null;
    var months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
    var day = parseInt(m[1], 10);
    var mon = months[m[2].toLowerCase()];
    if (mon === undefined) return null;
    // Use a fixed base year so all dates sort on the same timeline (no cross-year wrap)
    return new Date(2026, mon, day);
}

function renderLongTermMatrix() {
    var allPorts = ltAllPorts();
    var allSvcs = ltAllServices();
    var allOps = ltAllOperators();
    var allVessels = ltAllVessels();

    // ports will be computed after allVoyages is built (see below)

    // Build filter UI
    var h = '<div style="padding:12px;">';

    // Stats line
    var totalVoyages = 0;
    LT_DATA.forEach(function(svc) { totalVoyages += (svc.voyages || []).length; });
    var filteredVoyages = 0;

    // Filters
    h += '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;font-size:12px;">';
    h += '<span style="color:#888;">Lane:</span>';
    h += '<select id="ltSelSvc" onchange="ltFilterSvc=this.value;renderLongTermMatrix()" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;">';
    h += '<option value="">All (' + allSvcs.length + ' lanes)</option>';
    allSvcs.forEach(function(s) { h += '<option value="' + escapeHtml(s) + '"' + (ltFilterSvc === s ? ' selected' : '') + '>' + escapeHtml(s) + '</option>'; });
    h += '</select>';

    h += '<span style="color:#888;margin-left:8px;">Vessel:</span>';
    h += '<input id="ltSearchVessel" type="text" placeholder="Search vessel..." value="' + escapeHtml(ltFilterVessel) + '" oninput="ltFilterVessel=this.value;renderLongTermMatrix()" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;width:200px;">';

    h += '<span style="color:#888;margin-left:8px;">OP:</span>';
    h += '<select id="ltSelOp" onchange="ltFilterOp=this.value;renderLongTermMatrix()" style="padding:4px 8px;border:1px solid #ccc;border-radius:4px;font-size:12px;">';
    h += '<option value="">All (' + allOps.length + ' ops)</option>';
    allOps.forEach(function(o) { h += '<option value="' + escapeHtml(o) + '"' + (ltFilterOp === o ? ' selected' : '') + '>' + escapeHtml(o) + '</option>'; });
    h += '</select>';

    h += '<span style="color:#999;margin-left:auto;font-size:11px;">Long Term Schedule Matrix</span>';
    h += '</div>';

    // Read toolbar search & terminal
    var toolbarQ = (document.getElementById('searchInput') && document.getElementById('searchInput').value || '').trim().toLowerCase();
    var toolbarTerminal = (document.getElementById('selTerminal') && document.getElementById('selTerminal').value || '').trim();

    // Build terminal → port code mapping
    var termToPorts = {};
    LT_DATA.forEach(function(svc) {
        var pts = svc.port_terminals || {};
        Object.keys(pts).forEach(function(port) {
            var term = pts[port] || port;
            if (!termToPorts[term]) termToPorts[term] = [];
            if (termToPorts[term].indexOf(port) === -1) termToPorts[term].push(port);
        });
    });
    var terminalPorts = toolbarTerminal ? (termToPorts[toolbarTerminal] || []) : null;

    // Collect all voyages across filtered services
    var allVoyages = [];
    var selectedSvcs = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    var allLanes = _getLaneOptions().map(function(l){ return l.code; });
    var msHasSelection = selectedSvcs.length > 0 && selectedSvcs.length < allLanes.length;
    LT_DATA.forEach(function(svc) {
        var svcShort = (svc.short || '').trim();
        if (!svcShort) svcShort = (svc.code || '').substring(0, 3);
        if (msHasSelection && selectedSvcs.indexOf(svcShort) === -1) return;
        if (ltFilterSvc && svcShort !== ltFilterSvc) return;
        (svc.voyages || []).forEach(function(v) {
            if (ltFilterVessel && v.vessel.toUpperCase().indexOf(ltFilterVessel.toUpperCase()) === -1) return;
            if (ltFilterOp && (v.operator || '').trim() !== ltFilterOp) return;
            // Toolbar vessel/voy search
            if (toolbarQ) {
                var hay = (v.vessel + ' ' + v.vessel_voy + ' ' + (v.operator || '')).toLowerCase();
                if (hay.indexOf(toolbarQ) === -1) return;
            }
            // Also check upper OP multi-select
            var opMsKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
            var opMsAllOps = (window.DATA && window.DATA.all_operators) || [];
            if (opMsKeys.length > 0 && opMsKeys.length < opMsAllOps.length && opMsKeys.indexOf((v.operator || '').trim()) === -1) return;
            allVoyages.push({
                service: (svc.code || svc.short || '').substring(0, 3),
                code: svc.code,
                vessel: v.vessel,
                vessel_voy: v.vessel_voy,
                operator: v.operator || '',
                week: v.week,
                etas: v.etas || {}
            });
        });
    });
    filteredVoyages = allVoyages.length;

    // Filter ports to only those with ETA data in filtered voyages
    var portHasData = {};
    allVoyages.forEach(function(v) {
        var etas = v.etas || {};
        Object.keys(etas).forEach(function(p) {
            if (etas[p] && etas[p] !== '-') portHasData[p] = true;
        });
    });
    var ports = allPorts.filter(function(p) { return portHasData[p]; });

    // Further filter ports by toolbar Terminal selection
    if (terminalPorts && terminalPorts.length > 0) {
        ports = ports.filter(function(p) { return terminalPorts.indexOf(p) !== -1; });
    }

    // Apply port order (drag or default)
    if (ltPortOrder) {
        ports.sort(function(a, b) {
            var ia = ltPortOrder.indexOf(a), ib = ltPortOrder.indexOf(b);
            if (ia >= 0 && ib >= 0) return ia - ib;
            if (ia >= 0) return -1;
            if (ib >= 0) return 1;
            return a.localeCompare(b);
        });
    }

    // Sort: by service then week (default), or by clicked port ETA
    if (ltSortPort) {
        allVoyages.sort(function(a, b) {
            var da = ltParseETA(a.etas[ltSortPort] || '');
            var db = ltParseETA(b.etas[ltSortPort] || '');
            if (da === null && db === null) return 0;
            if (da === null) return 1;
            if (db === null) return -1;
            return ltSortAsc ? (da - db) : (db - da);
        });
    } else {
        var svcOrder = ['HDT','CCT','REX','CGX','AEM','SGX','JPS','NAF','MES','NP','GTS','IMR','RES','SJA',
            'AM','BDX','CGS','CH','CI','CP','CST','CSX','CWS','HLX','IQH','JCT','KHX','MFX','NSX','RTS','SGS','SL','ST','SVP','TBS','TH'];
        allVoyages.sort(function(a, b) {
            var sa = svcOrder.indexOf(a.service), sb = svcOrder.indexOf(b.service);
            if (sa !== sb) return (sa === -1 ? 999 : sa) - (sb === -1 ? 999 : sb);
            return (a.week || '').localeCompare(b.week || '');
        });
    }

    // Count display
    h += '<div style="margin-bottom:8px;font-size:11px;color:#666;"><b>' + filteredVoyages + '</b> voyages &times; <b>' + ports.length + '</b> ports';
    if (ltSortPort) h += ' | Sorted by <b style="color:var(--primary)">' + escapeHtml(ltSortPort) + '</b> ETA ' + (ltSortAsc ? '▲ asc' : '▼ desc') + ' <a href="javascript:void(0)" onclick="ltSortPort=\'\';renderLongTermMatrix()" style="color:#888;font-size:10px;">✕</a>';
    if (ltFilterSvc) h += ' | Lane: <b style="color:var(--primary)">' + escapeHtml(ltFilterSvc) + '</b>';
    if (ltFilterVessel) h += ' | Vessel: <b style="color:var(--primary)">' + escapeHtml(ltFilterVessel) + '</b>';
    if (ltFilterOp) h += ' | OP: <b style="color:var(--primary)">' + escapeHtml(ltFilterOp) + '</b>';
    // Upper OP multi-select hint
    var opMsHintKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opMsHintAll = (window.DATA && window.DATA.all_operators) || [];
    if (opMsHintKeys.length > 0 && opMsHintKeys.length < opMsHintAll.length) h += ' | OP: <b style="color:var(--primary)">' + opMsHintKeys.join('/') + '</b>';
    h += '</div>';

    // Build matrix table
    h += '<div style="overflow-x:auto;max-height:75vh;overflow-y:auto;border:1px solid #e0e0e0;border-radius:6px;">';
    h += '<table style="font-size:11px;min-width:100%;border-collapse:collapse;">';

    // Header
    h += '<thead><tr style="position:sticky;top:0;z-index:4;">';
    h += '<th style="min-width:42px;position:sticky;left:0;z-index:5;background:#1a3a5c;color:#fff;padding:6px 4px;font-size:10px;">Svc</th>';
    h += '<th style="min-width:140px;position:sticky;left:42px;z-index:5;background:#1a3a5c;color:#fff;padding:6px 4px;font-size:10px;">Vessel</th>';
    h += '<th style="min-width:48px;position:sticky;left:182px;z-index:5;background:#1a3a5c;color:#fff;padding:6px 4px;font-size:10px;">Voy</th>';
    h += '<th style="min-width:36px;position:sticky;left:230px;z-index:5;background:#1a3a5c;color:#fff;padding:6px 4px;font-size:10px;">Op</th>';

    ports.forEach(function(p) {
        var label = ltPortLabel(p);
        var isSortCol = (ltSortPort === p);
        var arrow = isSortCol ? (ltSortAsc ? ' ▲' : ' ▼') : '';
        var sortStyle = isSortCol ? 'text-decoration:underline;' : '';
        h += '<th style="min-width:72px;text-align:center;padding:6px 2px;background:#1a3a5c;color:#fff;font-size:9.5px;white-space:nowrap;cursor:grab;user-select:none;' + sortStyle + '"' +
            ' onclick="ltSortByPort(\'' + escapeHtml(p) + '\')"' +
            ' title="Click to sort by ' + escapeHtml(p) + ' ETA">' + escapeHtml(label) + arrow + '</th>';
    });
    h += '</tr></thead><tbody>';

    // Rows grouped by service
    var prevSvc = '';
    allVoyages.forEach(function(v) {
        // Service group header
        if (v.service !== prevSvc) {
            prevSvc = v.service;
            var bgc = LT_SVC_COLORS[v.service] || '#f5f5f5';
            h += '<tr style="background:' + bgc + ';">';
            h += '<td colspan="' + (4 + ports.length) + '" style="font-weight:700;padding:3px 8px;font-size:11px;color:#1F4E79;border-top:2px solid #1F4E79;">&#x1F6A2; ' + escapeHtml(v.service) + ' (' + escapeHtml(v.code) + ')</td>';
            h += '</tr>';
        }

        // Vessel row
        var cls = 'svc-' + v.service;
        h += '<tr class="' + cls + '" style="background:#fff;">';
        h += '<td style="position:sticky;left:0;z-index:2;text-align:center;font-weight:700;font-size:10px;color:#1F4E79;background:#fff;border-bottom:1px solid #eee;">' + escapeHtml(v.service) + '</td>';
        h += '<td style="position:sticky;left:42px;z-index:2;background:#fff;font-size:11px;border-bottom:1px solid #eee;white-space:nowrap;">' + escapeHtml(v.vessel) + '</td>';
        var voyLabel = (v.vessel_voy || '');
        var weekNum = (v.week || '').substring(2); // 202615 → 2615
        var voyText = voyLabel + (weekNum ? ' <b style="font-size:10px;color:#1F4E79;">' + weekNum + '</b>' : '');
        h += '<td style="position:sticky;left:182px;z-index:2;text-align:center;font-size:10px;color:#555;background:#fff;border-bottom:1px solid #eee;">' + voyText + '</td>';
        h += '<td style="position:sticky;left:230px;z-index:2;text-align:center;font-size:10px;color:#888;background:#fff;border-bottom:1px solid #eee;">' + escapeHtml(v.operator || '') + '</td>';

        ports.forEach(function(p) {
            var eta = v.etas[p] || '';
            if (!eta) {
                h += '<td style="text-align:center;font-size:10px;color:#ddd;border-bottom:1px solid #f5f5f5;">-</td>';
            } else {
                h += '<td style="text-align:center;font-size:10.5px;font-weight:600;color:#1F4E79;border-bottom:1px solid #f5f5f5;white-space:nowrap;">' + escapeHtml(eta) + '</td>';
            }
        });
        h += '</tr>';
    });

    h += '</tbody></table></div>';
    h += '</div>';

    document.getElementById('mainContent').innerHTML = h;
    _ltInitPortDrag();
}

// ========== Long Term Port Drag Reorder (mouse-based, more reliable than HTML5 DnD) ==========
var _ltDragState = { active: false, srcPort: null, srcIdx: -1, startX: 0, moved: false };

function _ltInitPortDrag() {
    var ths = document.querySelectorAll('#mainContent thead th[title]');
    ths.forEach(function(th) {
        th.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return; // left button only
            var port = this.getAttribute('title');
            if (!port || port.indexOf('Click to sort') === -1) return;
            // Extract actual port code from title "Click to sort by XXX ETA"
            port = port.replace('Click to sort by ', '').replace(' ETA', '');
            _ltDragState = { active: true, srcPort: port, srcIdx: -1, startX: e.clientX, startY: e.clientY, moved: false };
            this.style.opacity = '0.4';
            this.style.cursor = 'grabbing';
            e.preventDefault();
        });
    });

    document.addEventListener('mousemove', function(e) {
        if (!_ltDragState.active) return;
        var dx = e.clientX - _ltDragState.startX;
        var dy = e.clientY - _ltDragState.startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
            _ltDragState.moved = true;
            // Highlight target column under cursor
            var ths = document.querySelectorAll('#mainContent thead th[title]');
            ths.forEach(function(t) { t.style.borderBottom = ''; });
            var targetTh = document.elementFromPoint(e.clientX, e.clientY);
            while (targetTh && targetTh.tagName !== 'TH') targetTh = targetTh.parentElement;
            if (targetTh && targetTh.getAttribute('title')) {
                targetTh.style.borderBottom = '3px solid #ff6b00';
            }
        }
    });

    document.addEventListener('mouseup', function(e) {
        if (!_ltDragState.active) return;
        var ths = document.querySelectorAll('#mainContent thead th[title]');
        ths.forEach(function(t) { t.style.opacity = ''; t.style.borderBottom = ''; t.style.cursor = ''; });

        if (_ltDragState.moved) {
            var targetTh = null;
            ths.forEach(function(t) {
                var rect = t.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right &&
                    e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    targetTh = t;
                }
            });
            if (targetTh) {
                var targetTitle = targetTh.getAttribute('title') || '';
                var targetPort = targetTitle.replace('Click to sort by ', '').replace(' ETA', '');
                if (targetPort && targetPort !== _ltDragState.srcPort) {
                    var allPorts = ltAllPorts();
                    if (!ltPortOrder) ltPortOrder = allPorts.slice();
                    var fi = ltPortOrder.indexOf(_ltDragState.srcPort);
                    var ti = ltPortOrder.indexOf(targetPort);
                    if (fi >= 0 && ti >= 0) {
                        ltPortOrder.splice(fi, 1);
                        ltPortOrder.splice(ti, 0, _ltDragState.srcPort);
                        renderLongTermMatrix();
                    }
                }
            }
        }

        _ltDragState = { active: false, srcPort: null, srcIdx: -1, startX: 0, moved: false };
    });
}

// Call init after each render (hooked at end of renderLongTermMatrix)

</script>
<script>
// ========== Export Functions ==========
function getCurrentRawData() {
    var tVal = document.getElementById('selTerminal').value;
    var opSelectedKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opHasSelection = opSelectedKeys.length > 0 && opSelectedKeys.length < (window.DATA && window.DATA.all_operators ? window.DATA.all_operators.length : 0);
    var q = (document.getElementById('searchInput').value || '').trim().toLowerCase();
    return (window.DATA && window.DATA.all_records ? window.DATA.all_records : []).filter(function(r) {
        if (tVal && (r['Port Code'] || '') !== tVal && (r['Terminal'] || '') !== tVal) return false;
        var selCount = 0, selVals = {};
        Object.keys(msSelected).forEach(function(k){ if(msSelected[k]){ selVals[k]=true; selCount++; } });
        if (selCount > 0 && !selVals[r.Service || '']) return false;
        if (opHasSelection && opSelectedKeys.indexOf((r.Operator || '').trim()) === -1) return false;
        if (q) { var hay = (r.Service + ' ' + r['Vessel Name'] + ' ' + r['Port Code'] + ' ' + r['Voy.No']).toLowerCase(); if (hay.indexOf(q) === -1) return false; }
        return true;
    });
}

function getCurrentMatrixData() {
    var svcOrder = ['HDT','CCT','REX','CGX','AEM','SGX','JPS','NAF','MES','NP','GTS','IMR','RES','SJA',
        'AM','BDX','CGS','CH','CI','CP','CST','CSX','CWS','HLX','IQH','JCT','KHX','MFX','NSX','RTS','SGS','SL','ST','SVP','TBS','TH'];
    var allVoyages = [];
    var selectedSvcs = Object.keys(msSelected).filter(function(k){ return msSelected[k]; });
    var allLanes = _getLaneOptions().map(function(l){ return l.code; });
    var msHasSelection = selectedSvcs.length > 0 && selectedSvcs.length < (window.DATA && window.DATA.services ? allLanes.length : 0);
    var opSelectedKeys = Object.keys(opMsSelected).filter(function(k){ return opMsSelected[k]; });
    var opHasSelection = opSelectedKeys.length > 0 && opSelectedKeys.length < (window.DATA && window.DATA.all_operators ? window.DATA.all_operators.length : 0);
    LT_DATA.forEach(function(svc) {
        var svcShort = (svc.short || '').trim();
        if (!svcShort) svcShort = (svc.code || '').substring(0, 3);
        if (msHasSelection && selectedSvcs.indexOf(svcShort) === -1) return;
        (svc.voyages || []).forEach(function(v) {
            if (opHasSelection && opSelectedKeys.indexOf((v.operator || '').trim()) === -1) return;
            allVoyages.push({ service: svcShort, code: svc.code, vessel: v.vessel, vessel_voy: v.vessel_voy, operator: v.operator || '', week: v.week || '', etas: v.etas || {} });
        });
    });
    if (ltSortPort) {
        allVoyages.sort(function(a, b) {
            var da = ltParseETA(a.etas[ltSortPort] || ''), db = ltParseETA(b.etas[ltSortPort] || '');
            if (da === null && db === null) return 0; if (da === null) return 1; if (db === null) return -1;
            return ltSortAsc ? (da - db) : (db - da);
        });
    } else {
        allVoyages.sort(function(a, b) {
            var sa = svcOrder.indexOf(a.service), sb = svcOrder.indexOf(b.service);
            if (sa !== sb) return (sa === -1 ? 999 : sa) - (sb === -1 ? 999 : sb);
            return (a.week || '').localeCompare(b.week || '');
        });
    }
    var portHasData = {};
    allVoyages.forEach(function(v) { Object.keys(v.etas).forEach(function(p) { if (v.etas[p] && v.etas[p] !== '-') portHasData[p] = true; }); });
    var ports = (ltPortOrder && ltPortOrder.length ? ltPortOrder : []).filter(function(p) { return portHasData[p]; });
    if (ports.length === 0) ports = Object.keys(portHasData);
    var rows = [];
    allVoyages.forEach(function(v) {
        var row = { 'Service': v.service, 'Vessel': v.vessel, 'Voy': v.vessel_voy || '', 'Week': v.week || '', 'OP': v.operator || '' };
        ports.forEach(function(p) { row['ETA_' + p] = v.etas[p] || ''; });
        rows.push(row);
    });
    return rows;
}

function exportExcel() {
    var tab = currentTab;
    var data = (tab === 'longterm') ? getCurrentMatrixData() : getCurrentRawData();
    if (!data || !data.length) { alert('No data to export'); return; }
    var ws = XLSX.utils.json_to_sheet(data);
    var wscols = Object.keys(data[0]).map(function(k) {
        var max = k.length;
        data.forEach(function(r) { var len = String(r[k] || '').length; if (len > max) max = len; });
        return { wch: Math.min(max + 2, 30) };
    });
    ws['!cols'] = wscols;
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, tab === 'longterm' ? 'LongTermMatrix' : 'RawData');
    var fname = 'CUL_DAILY_' + (tab === 'longterm' ? 'LongTerm' : 'Raw') + '_' + new Date().toISOString().slice(0,10) + '.xlsx';
    XLSX.writeFile(wb, fname);
}

function exportPDF() {
    var el = document.getElementById('mainContent');
    if (!el) return;
    var opt = {
        margin: 0.3,
        filename: 'CUL_DAILY_' + currentTab + '_' + new Date().toISOString().slice(0,10) + '.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'a3', orientation: 'landscape' }
    };
    html2pdf().set(opt).from(el).save();
}
</script>
